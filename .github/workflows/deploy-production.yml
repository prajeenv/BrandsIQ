name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment intent
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "You must type 'deploy' to confirm. Got: ${{ github.event.inputs.confirm }}"
          exit 1

  check-e2e:
    name: Verify E2E Tests Passed
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check latest E2E staging workflow status
        uses: actions/github-script@v7
        with:
          script: |
            // Find the most recent E2E staging workflow run on main
            const workflows = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'e2e-staging.yml',
              branch: 'main',
              per_page: 1,
              status: 'completed',
            });

            if (workflows.data.total_count === 0) {
              core.warning('No E2E staging workflow runs found. Proceeding without E2E gate.');
              return;
            }

            const latestRun = workflows.data.workflow_runs[0];
            const conclusion = latestRun.conclusion;
            const runUrl = latestRun.html_url;

            core.info(`Latest E2E run: ${latestRun.head_sha.substring(0, 7)} — ${conclusion}`);
            core.info(`Run URL: ${runUrl}`);

            if (conclusion !== 'success') {
              core.setFailed(
                `Latest E2E staging tests ${conclusion}. Fix E2E failures before deploying to production.\n` +
                `See: ${runUrl}`
              );
            } else {
              core.info('✅ E2E staging tests passed. Safe to deploy.');
            }

  test:
    name: Run All Tests
    needs: [validate, check-e2e]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brandsiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linting
        run: npm run lint:strict

      - name: Run type check
        run: npm run type-check

      - name: Apply migrations to test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brandsiq_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/brandsiq_test

      - name: Run all tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brandsiq_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/brandsiq_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations to production database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      - name: Push to production branch (triggers Vercel production deploy)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout production
          git merge main --ff-only
          git push origin production

  smoke-check:
    name: Post-Deploy Smoke Check
    needs: deploy-production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Wait for Vercel production deployment
        run: |
          echo "Waiting 90 seconds for Vercel to deploy production..."
          sleep 90

      - name: Ping production /api/health
        id: health
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "::error::PRODUCTION_URL secret is not set."
            exit 1
          fi

          # Up to 3 attempts, 30s apart — Vercel may still be warming up
          for attempt in 1 2 3; do
            echo "Attempt $attempt: curl $PRODUCTION_URL/api/health"
            STATUS=$(curl -s -o response.json -w "%{http_code}" "$PRODUCTION_URL/api/health")
            echo "HTTP $STATUS"
            cat response.json || true
            echo

            if [ "$STATUS" = "200" ]; then
              echo "✅ Production health check passed."
              exit 0
            fi

            if [ $attempt -lt 3 ]; then
              echo "Retrying in 30s..."
              sleep 30
            fi
          done

          echo "::error::Production health check failed after 3 attempts (last HTTP $STATUS)."
          exit 1
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitSha = context.sha.substring(0, 7);
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production Smoke Check Failed (${commitSha})`,
              body: [
                `## Production Smoke Check Failed After Deploy`,
                ``,
                `**Commit:** [\`${commitSha}\`](${commitUrl})`,
                `**Workflow Run:** [View logs](${runUrl})`,
                ``,
                `The \`/api/health\` endpoint on production did not return 200 after the deploy completed.`,
                `This usually means one of:`,
                `- Vercel production env vars are misconfigured (e.g. DATABASE_URL password, URL-encoded chars)`,
                `- Production database is unreachable`,
                `- App failed to start due to a runtime error`,
                ``,
                `### What to do`,
                `1. Check the [workflow run logs](${runUrl}) for the exact HTTP status and error`,
                `2. Check Vercel production function logs for \`/api/health\``,
                `3. Verify Vercel Production env vars (\`DATABASE_URL\`, \`DIRECT_URL\`, \`AUTH_SECRET\`, etc.)`,
                `4. Once fixed, redeploy from the Vercel dashboard or push a new commit to main`,
                ``,
                `---`,
                `*Automatically created by the production smoke check.*`,
              ].join('\n'),
              labels: ['bug', 'production-incident', 'automated'],
            });

      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Production Deploy Verified" >> $GITHUB_STEP_SUMMARY
            echo "Production /api/health returned 200 after deployment." >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🚨 Production Smoke Check FAILED" >> $GITHUB_STEP_SUMMARY
            echo "The deployment succeeded but the app is unhealthy. Investigate immediately." >> $GITHUB_STEP_SUMMARY
            echo "A GitHub Issue has been created." >> $GITHUB_STEP_SUMMARY
          fi
